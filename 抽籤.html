<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>計時器與硬幣工具</title>
    <style>
        /* 全局背景與字體設定 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden; /* 防止側欄出現時產生水平捲動條 */
        }

        /* 計時器主體卡片設計 */
        .timer-card {
            background-color: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 450px; 
            z-index: 10;
        }

        #btn-mode {
            background-color: #edf2f7;
            color: #4a5568;
            border: 1px solid #cbd5e0;
            padding: 8px 15px;
            font-size: 1rem;
            border-radius: 20px;
            margin-bottom: 25px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
        }
        #btn-mode:hover { background-color: #e2e8f0; }

        #display {
            font-size: 7.5rem;
            font-weight: bold;
            color: #2d3748;
            background-color: #edf2f7;
            padding: 15px 10px;
            border-radius: 15px;
            margin-bottom: 25px;
            letter-spacing: 2px;
            box-shadow: inset 0 4px 6px rgba(0, 0, 0, 0.05);
            transition: color 0.3s, font-size 0.2s; /* 讓字體縮放時有平滑過渡 */
            line-height: 1; 
            white-space: nowrap; /* 強迫文字絕對保持在同一排 */
            overflow: hidden;
        }

        /* 當時間到時，縮小字體確保「時間到！」在 card 內完美變一排 */
        #display.time-up {
            font-size: 4.2rem;
            letter-spacing: 0px;
            padding: 40px 10px; /* 微調上下邊距讓視覺更平衡 */
        }

        .custom-input-area {
            display: none; 
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
        }
        .custom-input-area input {
            width: 70px;
            padding: 10px;
            font-size: 1.5rem;
            text-align: center;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            outline: none;
        }
        .custom-input-area input:focus { border-color: #667eea; }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .row-buttons {
            display: flex;
            gap: 15px;
        }

        button {
            border: none;
            padding: 15px 20px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            color: white;
            transition: all 0.2s ease;
            flex: 1;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        button:active { transform: scale(0.96); }
        button:disabled {
            background-color: #cbd5e0 !important;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        #btn-draw { background-color: #667eea; }
        #btn-draw:hover:not(:disabled) { background-color: #5a67d8; }
        #btn-toggle { background-color: #48bb78; }
        #btn-toggle:hover:not(:disabled) { filter: brightness(0.9); }
        #btn-reset { background-color: #f56565; }
        #btn-reset:hover:not(:disabled) { background-color: #e53e3e; }

        /* 側欄 (Sidebar) 設計 */
        #sidebar-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: #4a5568;
            color: white;
            padding: 10px 15px;
            border-radius: 10px;
            font-size: 1rem;
            z-index: 100;
            width: auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        #sidebar-toggle:hover { background-color: #2d3748; }

        .sidebar {
            position: fixed;
            top: 0;
            right: -350px; 
            width: 320px;
            height: 100%;
            background-color: white;
            box-shadow: -5px 0 20px rgba(0,0,0,0.15);
            transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 90;
            padding: 80px 20px 20px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }
        .sidebar.open {
            right: 0; 
        }

        .sidebar h3 {
            margin: 0 0 15px 0;
            color: #2d3748;
            font-size: 1.4rem;
            text-align: center;
        }

        /* 側欄頁籤切換按鈕設計 */
        .tab-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background-color: #edf2f7;
            padding: 5px;
            border-radius: 12px;
        }
        .tab-btn {
            background-color: transparent;
            color: #4a5568;
            padding: 10px;
            font-size: 1rem;
            box-shadow: none;
            border-radius: 8px;
        }
        .tab-btn:hover { background-color: #e2e8f0; }
        .tab-btn.active-orange { background-color: #ed8936; color: white; }
        .tab-btn.active-purple { background-color: #9f7aea; color: white; }

        /* 分頁容器 */
        .page-content {
            display: none; 
            flex-direction: column;
            gap: 20px;
        }
        .page-content.active {
            display: flex;
        }

        .coin-box {
            background-color: #f7fafc;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            border: 1px solid #e2e8f0;
        }

        .btn-orange { background-color: #ed8936; font-size: 1rem; padding: 10px; }
        .btn-orange:hover { background-color: #dd6b20; }
        
        .btn-purple { background-color: #9f7aea; font-size: 1rem; padding: 10px; }
        .btn-purple:hover { background-color: #805ad5; }

        /* 硬幣結果顯示區 */
        .result-box {
            background-color: #2d3748;
            color: #f7fafc;
            padding: 15px;
            border-radius: 10px;
            min-height: 120px;
            font-size: 1.1rem;
            line-height: 1.8;
            text-align: left;
            font-family: monospace;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }

    </style>
</head>
<body>

    <button id="sidebar-toggle" onclick="toggleSidebar()">☰ 附加工具</button>

    <div id="sidebar" class="sidebar">
        <h3>🪙 硬幣擲球</h3>
        
        <div class="tab-container">
            <button id="tab-orange" class="tab-btn active-orange" onclick="switchTab('orange')">🟠 橘球模式</button>
            <button id="tab-purple" class="tab-btn" onclick="switchTab('purple')">🟣 紫球模式</button>
        </div>

        <div id="page-orange" class="page-content active">
            <div class="coin-box">
                <button class="btn-orange" onclick="tossOrange()">擲 橘球 (4個硬幣)</button>
            </div>
            <div id="result-orange" class="result-box">
                請點擊上方按鈕開始擲橘球...
            </div>
        </div>

        <div id="page-purple" class="page-content">
            <div class="coin-box">
                <button class="btn-purple" onclick="tossPurple()">擲 紫球 (2個硬幣)</button>
            </div>
            <div id="result-purple" class="result-box">
                請點擊上方按鈕開始擲紫球...
            </div>
        </div>

    </div>

    <div class="timer-card">
        <button id="btn-mode" onclick="switchMode()">切換至 ⚙️ 自訂 Timer 模式</button>
        
        <div id="display">00:00</div>
        
        <div class="custom-input-area" id="custom-area">
            <input type="number" id="input-min" min="0" max="99" value="0" oninput="updateCustomDisplay()"> 分
            <input type="number" id="input-sec" min="0" max="59" value="0" oninput="updateCustomDisplay()"> 秒
        </div>

        <div class="button-group">
            <button id="btn-draw" onclick="drawTime()">🎲 抽取時間 (1~2分鐘)</button>
            <div class="row-buttons">
                <button id="btn-toggle" onclick="toggleTimer()" disabled>▶️ 開始</button>
                <button id="btn-reset" onclick="resetTimer()">🔄 RESET</button>
            </div>
        </div>
    </div>

    <script>
        // ================= 硬幣側欄邏輯 =================

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('open');
        }

        function switchTab(mode) {
            const pageOrange = document.getElementById('page-orange');
            const pagePurple = document.getElementById('page-purple');
            const tabOrange = document.getElementById('tab-orange');
            const tabPurple = document.getElementById('tab-purple');

            pageOrange.classList.remove('active');
            pagePurple.classList.remove('active');
            tabOrange.classList.remove('active-orange');
            tabPurple.classList.remove('active-purple');

            if (mode === 'orange') {
                pageOrange.classList.add('active');
                tabOrange.classList.add('active-orange');
            } else {
                pagePurple.classList.add('active');
                tabPurple.classList.add('active-purple');
            }
        }

        function tossOrange() {
            let results = [];
            for(let i = 0; i < 4; i++) {
                let isHeads = Math.random() < 0.5; 
                results.push(isHeads ? "前" : "後");
            }
            
            const resultBox = document.getElementById('result-orange');
            resultBox.innerHTML = `
                <span style="color:#f6ad55; font-weight:bold;">橘球位置:</span><br>
                1. ${results[0]}<br>
                2. ${results[1]}<br>
                3. ${results[2]}<br>
                4. ${results[3]}
            `;
        }

        function tossPurple() {
            let coin1Heads = Math.random() < 0.5;
            let coin2Heads = Math.random() < 0.5;

            let pos1 = coin1Heads ? "左" : "右";
            let pos2 = coin2Heads ? "左" : "右";

            const resultBox = document.getElementById('result-purple');
            resultBox.innerHTML = `
                <span style="color:#b794f4; font-weight:bold;">紫球位置:</span><br>
                1. ${pos1}<br>
                2. ${pos2}
            `;
        }

        // ================= 計時器邏輯 =================
        let timerInterval;
        let autoResetTimeout; 
        let totalSeconds = 0;
        let isRunning = false;
        let isPaused = false; 
        let currentMode = 'random'; 

        const display = document.getElementById('display');
        const btnMode = document.getElementById('btn-mode');
        const btnDraw = document.getElementById('btn-draw');
        const customArea = document.getElementById('custom-area');
        const btnToggle = document.getElementById('btn-toggle');
        const inputMin = document.getElementById('input-min');
        const inputSec = document.getElementById('input-sec');

        function playCountdownBeep() {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) return; 
            const ctx = new AudioContext();
            const osc = ctx.createOscillator();
            const gainNode = ctx.createGain();
            
            osc.connect(gainNode);
            gainNode.connect(ctx.destination);
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(440, ctx.currentTime); 
            gainNode.gain.setValueAtTime(1.0, ctx.currentTime); 
            gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1); 
            
            osc.start(ctx.currentTime);
            osc.stop(ctx.currentTime + 0.1);
        }

        function playEndSound() {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) return; 
            const ctx = new AudioContext();
            
            for (let i = 0; i < 2; i++) {
                const osc = ctx.createOscillator();
                const gainNode = ctx.createGain();
                
                osc.connect(gainNode);
                gainNode.connect(ctx.destination);
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, ctx.currentTime + (i * 1.1)); 
                
                let startTime = ctx.currentTime + (i * 1.1);
                gainNode.gain.setValueAtTime(1.0, startTime); 
                gainNode.gain.setValueAtTime(1.0, startTime + 0.75); 
                gainNode.gain.exponentialRampToValueAtTime(0.001, startTime + 0.8); 
                
                osc.start(startTime);
                osc.stop(startTime + 0.8);
            }
        }

        function updateDisplay(seconds) {
            let m = Math.floor(seconds / 60);
            let s = seconds % 60;
            m = m < 10 ? "0" + m : m;
            s = s < 10 ? "0" + s : s;
            display.textContent = m + ":" + s;
        }

        function updateCustomDisplay() {
            if (isRunning || isPaused) return; 
            let m = parseInt(inputMin.value) || 0;
            let s = parseInt(inputSec.value) || 0;
            totalSeconds = (m * 60) + s;
            updateDisplay(totalSeconds);
            
            display.classList.remove('time-up'); 
            display.style.color = "#2d3748";
            btnToggle.disabled = totalSeconds <= 0;
        }

        // 核心修改：切換模式時「自動強制 RESET 歸零」
        function switchMode() {
            if (isRunning) return; 
            if (autoResetTimeout) clearTimeout(autoResetTimeout); // 清除10秒自動重置倒數

            if (currentMode === 'random') {
                currentMode = 'custom';
                btnMode.innerHTML = "切換至 🎲 隨機 Timer 模式";
                btnDraw.style.display = 'none';
                customArea.style.display = 'flex';
                
                // 自動 RESET 為自訂模式的初始值 00:00
                inputMin.value = 0;
                inputSec.value = 0;
                inputMin.disabled = false;
                inputSec.disabled = false;
                totalSeconds = 0;
                updateDisplay(0);
                btnToggle.disabled = true;
            } else {
                currentMode = 'random';
                btnMode.innerHTML = "切換至 ⚙️ 自訂 Timer 模式";
                btnDraw.style.display = 'block';
                customArea.style.display = 'none';
                
                // 自動 RESET 為隨機模式的初始值 00:00
                totalSeconds = 0;
                updateDisplay(0);
                btnDraw.disabled = false;
                btnToggle.disabled = true;
            }
            
            // 通用畫面還原
            display.classList.remove('time-up');
            display.style.color = "#2d3748"; 
            setToggleState('start');
            isPaused = false;
        }

        function setToggleState(state) {
            if (state === 'start') {
                btnToggle.innerHTML = "▶️ 開始";
                btnToggle.style.backgroundColor = "#48bb78"; 
            } else if (state === 'pause') {
                btnToggle.innerHTML = "⏸️ 暫停";
                btnToggle.style.backgroundColor = "#ed8936"; 
            } else if (state === 'resume') {
                btnToggle.innerHTML = "▶️ 繼續";
                btnToggle.style.backgroundColor = "#48bb78"; 
            }
        }

        function drawTime() {
            if (isRunning) return; 
            if (autoResetTimeout) clearTimeout(autoResetTimeout); 

            totalSeconds = Math.floor(Math.random() * (120 - 60 + 1)) + 60;
            display.classList.remove('time-up'); 
            updateDisplay(totalSeconds);
            display.style.color = "#2d3748";
            btnToggle.disabled = false;
            setToggleState('start');
            isPaused = false;
        }

        function toggleTimer() {
            if (totalSeconds <= 0) return;
            if (autoResetTimeout) clearTimeout(autoResetTimeout); 

            if (isRunning) {
                clearInterval(timerInterval);
                isRunning = false;
                isPaused = true;
                setToggleState('resume');
                btnMode.disabled = false; 
                
                if (currentMode === 'random') btnDraw.disabled = false;
                if (currentMode === 'custom') {
                    inputMin.disabled = false;
                    inputSec.disabled = false;
                }
            } else {
                isRunning = true;
                isPaused = false;
                setToggleState('pause');
                btnMode.disabled = true; 
                btnDraw.disabled = true; 
                
                if (currentMode === 'custom') {
                    inputMin.disabled = true;
                    inputSec.disabled = true;
                }

                const tempAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (tempAudioCtx.state === 'suspended') tempAudioCtx.resume();

                timerInterval = setInterval(function () {
                    totalSeconds--;
                    updateDisplay(totalSeconds);

                    if (totalSeconds <= 10 && totalSeconds > 0) {
                        playCountdownBeep();
                    }

                    if (totalSeconds <= 0) {
                        clearInterval(timerInterval);
                        isRunning = false;
                        isPaused = false;
                        
                        display.classList.add('time-up');
                        display.textContent = "時間到！";
                        display.style.color = "#e53e3e"; 
                        
                        setToggleState('start');
                        btnToggle.disabled = true;
                        btnMode.disabled = false;

                        if (currentMode === 'random') btnDraw.disabled = false;
                        if (currentMode === 'custom') {
                            inputMin.disabled = false;
                            inputSec.disabled = false;
                        }
                        
                        playEndSound();

                        autoResetTimeout = setTimeout(function() {
                            resetTimer();
                        }, 10000);
                    }
                }, 1000);
            }
        }

        function resetTimer() {
            clearInterval(timerInterval);
            if (autoResetTimeout) clearTimeout(autoResetTimeout); 

            isRunning = false;
            isPaused = false;
            display.classList.remove('time-up'); 
            
            btnMode.disabled = false;
            if (currentMode === 'random') {
                totalSeconds = 0;
                updateDisplay(0);
                btnDraw.disabled = false;
                btnToggle.disabled = true;
            } else {
                updateCustomDisplay();
                inputMin.disabled = false;
                inputSec.disabled = false;
            }
            
            display.style.color = "#2d3748"; 
            setToggleState('start');
        }

        // ================= 鍵盤快捷鍵邏輯 =================
        window.addEventListener('keydown', function(e) {
            if (e.code === 'Space' || e.code === 'Enter') {
                if (document.activeElement.tagName === 'INPUT' && e.code === 'Space') {
                    return; 
                }

                e.preventDefault(); 

                if (!btnToggle.disabled) {
                    toggleTimer();
                }
            }
        });
    </script>

</body>
</html>
